services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ANTHROPIC_API_KEY
      - VOYAGE_API_KEY
      - TAVILY_API_KEY
      - SUPABASE_URL
      - SUPABASE_SERVICE_KEY
      - SUPABASE_JWT_SECRET
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    environment:
      - ANTHROPIC_API_KEY
      - VOYAGE_API_KEY
      - SUPABASE_URL
      - SUPABASE_SERVICE_KEY
      - MCP_API_KEY
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend

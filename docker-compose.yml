services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY
      - VOYAGE_API_KEY
      - TAVILY_API_KEY
      - SUPABASE_URL
      - SUPABASE_SERVICE_KEY
      - SUPABASE_JWT_SECRET
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    ports:
      - "8001:8001"
    environment:
      - ANTHROPIC_API_KEY
      - VOYAGE_API_KEY
      - SUPABASE_URL
      - SUPABASE_SERVICE_KEY
      - MCP_API_KEY
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL
        - VITE_SUPABASE_ANON_KEY
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
